<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicao} ? 'Editar curso' : 'Novo curso'">Form curso</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: #f3f4f6;
        }

        .page-wrap {
            max-width: 900px;
            margin: 0 auto;
            padding: 40px 16px;
        }

        .form-card {
            width: 100%;
            border-radius: 18px;
        }

        .card-header {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 16px;
            margin-bottom: 24px;
        }

        .card-header h1 {
            margin: 0;
            font-size: 1.8rem;
            font-weight: 700;
            color: #1f2937;
        }

        .field-group {
            margin-bottom: 18px;
        }

        .actions {
            display: flex;
            gap: 12px;
            flex-wrap: wrap;
            margin-top: 8px;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="mdl-card mdl-shadow--6dp form-card">
        <div class="mdl-card__title">
            <h1 class="mdl-card__title-text" th:text="${modoEdicao} ? 'Editar curso' : 'Novo curso'">Novo curso</h1>
        </div>
        <div class="mdl-card__supporting-text" style="padding-top: 0;">
            <div class="card-header">
                <span></span>
                <a th:href="@{/cursos}" class="mdl-button mdl-js-button mdl-button--icon" aria-label="Voltar">
                    <i class="material-icons">arrow_back</i>
                </a>
            </div>

            <div th:if="${mensagemErro}" class="mdl-color--red-50" style="padding: 12px 16px; border-radius: 8px; color: #b91c1c; margin-bottom: 20px;" th:text="${mensagemErro}"></div>

            <form th:object="${cursoForm}"
                  th:action="${modoEdicao} ? @{|/cursos/${cursoForm.idCurso}|} : @{/cursos}"
                  method="post">

                <div class="field-group mdl-textfield mdl-js-textfield mdl-textfield--floating-label" style="width: 100%;">
                    <input class="mdl-textfield__input" type="text" id="nome" th:field="*{nome}">
                    <label class="mdl-textfield__label" for="nome">Nome</label>
                    <span class="mdl-textfield__error" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></span>
                </div>

                <div class="field-group mdl-textfield mdl-js-textfield mdl-textfield--floating-label" style="width: 100%;">
                    <textarea class="mdl-textfield__input" id="descricao" rows="5" th:field="*{descricao}"></textarea>
                    <label class="mdl-textfield__label" for="descricao">Descrição</label>
                    <span class="mdl-textfield__error" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></span>
                </div>

                <div class="actions">
                    <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--colored">
                        <i class="material-icons" style="margin-right: 8px;">save</i>
                        Salvar
                    </button>
                    <a th:href="@{/cursos}" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect">
                        Cancelar
                    </a>
                </div>
            </form>
        </div>
    </div>
</div>
</body>
</html>
