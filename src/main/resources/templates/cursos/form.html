<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicao} ? 'Editar curso' : 'Novo curso'">Form curso</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
<div class="max-w-3xl mx-auto py-10 px-4">
    <div class="bg-white rounded-xl shadow p-6">
        <div class="flex items-center justify-between mb-6">
            <h1 class="text-2xl font-bold text-slate-800" th:text="${modoEdicao} ? 'Editar curso' : 'Novo curso'">Novo curso</h1>
            <a th:href="@{/cursos}" class="text-slate-600 hover:text-slate-900">Voltar</a>
        </div>

        <div th:if="${mensagemErro}" class="mb-4 rounded-lg border border-red-200 bg-red-50 text-red-700 px-4 py-3" th:text="${mensagemErro}"></div>

        <form th:object="${cursoForm}"
              th:action="${modoEdicao} ? @{|/cursos/${cursoForm.idCurso}|} : @{/cursos}"
              method="post"
              class="space-y-4">

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Nome</label>
                <input type="text" th:field="*{nome}" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500">
                <p class="text-red-600 text-sm mt-1" th:if="${#fields.hasErrors('nome')}" th:errors="*{nome}"></p>
            </div>

            <div>
                <label class="block text-sm font-medium text-slate-700 mb-1">Descrição</label>
                <textarea th:field="*{descricao}" rows="5" class="w-full border border-slate-300 rounded-lg px-3 py-2 focus:outline-none focus:ring-2 focus:ring-emerald-500"></textarea>
                <p class="text-red-600 text-sm mt-1" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></p>
            </div>

            <div class="flex items-center gap-3 pt-2">
                <button type="submit" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg">
                    Salvar
                </button>
                <a th:href="@{/cursos}" class="bg-slate-200 hover:bg-slate-300 text-slate-800 px-4 py-2 rounded-lg">
                    Cancelar
                </a>
            </div>
        </form>
    </div>
</div>
</body>
</html>
