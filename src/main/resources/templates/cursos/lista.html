<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="bg-slate-100 min-h-screen">
<div class="max-w-6xl mx-auto py-10 px-4">
    <div class="flex items-center justify-between mb-6">
        <div>
            <h1 class="text-3xl font-bold text-slate-800">CRUD de Cursos</h1>
            <a th:href="@{/}" class="text-sm text-slate-500 hover:text-slate-900">Voltar para home</a>
        </div>
        <a th:href="@{/cursos/novo}" class="bg-emerald-600 hover:bg-emerald-700 text-white px-4 py-2 rounded-lg shadow">
            Novo curso
        </a>
    </div>

    <div class="bg-white rounded-xl shadow overflow-hidden">
        <table class="w-full">
            <thead class="bg-slate-50">
            <tr class="text-left text-slate-600 text-sm uppercase tracking-wider">
                <th class="p-4">ID</th>
                <th class="p-4">Nome</th>
                <th class="p-4">Descrição</th>
                <th class="p-4">Ações</th>
            </tr>
            </thead>
            <tbody>
            <tr th:if="${#lists.isEmpty(cursos)}">
                <td colspan="4" class="p-6 text-center text-slate-500">Nenhum curso cadastrado.</td>
            </tr>
            <tr th:each="curso : ${cursos}" class="border-t border-slate-100 hover:bg-slate-50">
                <td class="p-4 font-medium" th:text="${curso.idCurso}">1</td>
                <td class="p-4" th:text="${curso.nome}">Nome</td>
                <td class="p-4" th:text="${curso.descricao}">Descrição</td>
                <td class="p-4">
                    <div class="flex items-center gap-2">
                        <a th:href="@{|/cursos/${curso.idCurso}/editar|}"
                           class="bg-amber-500 hover:bg-amber-600 text-white px-3 py-1 rounded">Editar</a>
                        <form th:action="@{|/cursos/${curso.idCurso}/excluir|}" method="post"
                              onsubmit="return confirm('Deseja realmente excluir?')">
                            <button type="submit" class="bg-red-600 hover:bg-red-700 text-white px-3 py-1 rounded">Excluir</button>
                        </form>
                    </div>
                </td>
            </tr>
            </tbody>
        </table>
    </div>
</div>
</body>
</html>
