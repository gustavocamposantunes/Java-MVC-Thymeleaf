<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cursos</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body data-page="list">
<div class="app-shell">
    <main class="app-container">
    <div class="section-toolbar">
        <div>
            <div class="app-breadcrumb">
                <i class="material-icons">school</i>
                Cursos
            </div>
            <h1 class="app-title">CRUD de Cursos</h1>
            <p class="app-subtitle">Gerencie os cursos cadastrados com uma interface mais limpa e responsiva.</p>
        </div>
        <div class="actions">
            <a th:href="@{/}" class="mdl-button mdl-js-button mdl-button--icon" aria-label="Voltar para home">
                <i class="material-icons">home</i>
            </a>
            <a th:href="@{/cursos/novo}" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--colored">
                <i class="material-icons" style="margin-right: 8px;">add</i>
                Novo curso
            </a>
        </div>
    </div>

    <div th:if="${mensagemSucesso}" class="alert alert--success" data-auto-dismiss>
        <i class="material-icons">check_circle</i>
        <span th:text="${mensagemSucesso}"></span>
    </div>
    <div th:if="${mensagemErro}" class="alert alert--danger" data-auto-dismiss>
        <i class="material-icons">error</i>
        <span th:text="${mensagemErro}"></span>
    </div>

    <section class="surface-card">
        <div class="table-wrap">
            <table class="mdl-data-table mdl-js-data-table">
                <thead>
                <tr>
                    <th class="mdl-data-table__cell--non-numeric">ID</th>
                    <th class="mdl-data-table__cell--non-numeric">Nome</th>
                    <th class="mdl-data-table__cell--non-numeric">Descrição</th>
                    <th class="mdl-data-table__cell--non-numeric">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(cursos)}">
                    <td colspan="4">
                        <div class="empty-state">
                            <i class="material-icons">school</i>
                            Nenhum curso cadastrado.
                        </div>
                    </td>
                </tr>
                <tr th:each="curso : ${cursos}">
                    <td class="mdl-data-table__cell--non-numeric" th:text="${curso.idCurso}">1</td>
                    <td class="mdl-data-table__cell--non-numeric" th:text="${curso.nome}">Nome</td>
                    <td class="mdl-data-table__cell--non-numeric" th:text="${curso.descricao}">Descrição</td>
                    <td class="mdl-data-table__cell--non-numeric">
                        <div class="actions-cell">
                            <a th:href="@{|/cursos/${curso.idCurso}/editar|}" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect">
                                <i class="material-icons" style="margin-right: 8px;">edit</i>
                                Editar
                            </a>
                            <form th:action="@{|/cursos/${curso.idCurso}/excluir|}" method="post" data-confirm="Deseja realmente excluir este curso?" style="display: inline;">
                                <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--accent">
                                    <i class="material-icons" style="margin-right: 8px;">delete</i>
                                    Excluir
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </section>
</main>
</div>
</body>
</html>
