<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Java MVC Thymeleaf</title>
    <script src="https://cdn.tailwindcss.com"></script>
</head>
<body class="min-h-screen bg-gradient-to-br from-slate-100 to-slate-200 flex items-center justify-center p-6">
<div class="max-w-4xl w-full">
    <div class="bg-white rounded-2xl shadow-xl overflow-hidden">
        <div class="px-8 py-10 bg-slate-900 text-white text-center">
            <p class="text-sm uppercase tracking-[0.3em] text-slate-300 mb-3">Sistema acadêmico</p>
            <h1 class="text-3xl md:text-4xl font-bold mb-3">Java MVC Thymeleaf</h1>
            <p class="text-slate-300 max-w-2xl mx-auto">Selecione abaixo qual módulo deseja acessar.</p>
        </div>

        <div class="grid gap-6 md:grid-cols-2 p-8">
            <a th:href="@{/propostas}"
               class="group rounded-xl border border-slate-200 p-6 hover:border-blue-500 hover:shadow-lg transition bg-slate-50">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-bold text-slate-800">Propostas</h2>
                    <span class="text-blue-600 text-3xl">↗</span>
                </div>
                <p class="text-slate-600 mb-6">Acesse o CRUD de propostas com anexos e status.</p>
                <span class="inline-flex items-center rounded-lg bg-blue-600 group-hover:bg-blue-700 text-white px-4 py-2">
                    Abrir propostas
                </span>
            </a>

            <a th:href="@{/cursos}"
               class="group rounded-xl border border-slate-200 p-6 hover:border-emerald-500 hover:shadow-lg transition bg-slate-50">
                <div class="flex items-center justify-between mb-4">
                    <h2 class="text-2xl font-bold text-slate-800">Cursos</h2>
                    <span class="text-emerald-600 text-3xl">↗</span>
                </div>
                <p class="text-slate-600 mb-6">Acesse o CRUD de cursos com nome e descrição.</p>
                <span class="inline-flex items-center rounded-lg bg-emerald-600 group-hover:bg-emerald-700 text-white px-4 py-2">
                    Abrir cursos
                </span>
            </a>
        </div>
    </div>
</div>
</body>
</html>
