<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body data-page="form">
<div class="app-shell">
    <main class="app-container">
        <section class="app-card form-card" style="max-width: 520px;">
            <div class="form-card__header">
                <div class="form-card__eyebrow">Autenticação</div>
                <h1 class="form-card__title">Acesso ao sistema</h1>
                <p class="form-card__subtitle">Entre com suas credenciais para acessar as funcionalidades.</p>
            </div>

            <div class="app-card__body">
                <div th:if="${mensagemSucesso}" class="alert alert--success" data-auto-dismiss>
                    <i class="material-icons">check_circle</i>
                    <span th:text="${mensagemSucesso}"></span>
                </div>
                <div th:if="${mensagemErro}" class="alert alert--danger" data-auto-dismiss>
                    <i class="material-icons">error</i>
                    <span th:text="${mensagemErro}"></span>
                </div>

                <form th:action="@{/login}" th:object="${loginForm}" method="post" data-submit-loading>
                    <div class="form-section">
                        <div class="form-grid">
                            <div class="form-field form-field--full">
                                <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                                    <input class="mdl-textfield__input" type="text" id="username" th:field="*{username}" autocomplete="username">
                                    <label class="mdl-textfield__label" for="username">Usuário</label>
                                    <span class="mdl-textfield__error" th:if="${#fields.hasErrors('username')}" th:errors="*{username}"></span>
                                </div>
                            </div>

                            <div class="form-field form-field--full">
                                <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label">
                                    <input class="mdl-textfield__input" type="password" id="senha" th:field="*{senha}" autocomplete="current-password">
                                    <label class="mdl-textfield__label" for="senha">Senha</label>
                                    <span class="mdl-textfield__error" th:if="${#fields.hasErrors('senha')}" th:errors="*{senha}"></span>
                                </div>
                            </div>

                            <div class="form-field form-field--full">
                                <div class="form-actions" style="justify-content: center;">
                                    <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect btn--blue">
                                        <i class="material-icons" style="margin-right: 8px;">login</i>
                                        Entrar
                                    </button>
                                </div>
                            </div>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
