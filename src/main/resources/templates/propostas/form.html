<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title th:text="${modoEdicao} ? 'Editar proposta' : 'Nova proposta'">Form proposta</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
    <link rel="stylesheet" th:href="@{/css/app.css}">
    <script defer th:src="@{/js/app.js}"></script>
</head>
<body data-page="form">
<div class="app-shell">
    <main class="app-container">
        <div class="app-topbar">
            <div>
                <div class="app-breadcrumb">
                    <i class="material-icons">description</i>
                    Propostas
                </div>
                <h1 class="app-title" th:text="${modoEdicao} ? 'Editar proposta' : 'Nova proposta'">Nova proposta</h1>
                <p class="app-subtitle">Cadastre uma proposta com título, descrição, status, data e anexo.</p>
            </div>
            <a th:href="@{/propostas}" class="mdl-button mdl-js-button mdl-button--icon" aria-label="Voltar">
                <i class="material-icons">arrow_back</i>
            </a>
        </div>

        <section class="app-card form-card">
            <div class="app-card__body">
                <div th:if="${mensagemErro}" class="alert alert--danger" data-auto-dismiss>
                    <i class="material-icons">error</i>
                    <span th:text="${mensagemErro}"></span>
                </div>

                <form th:object="${propostaForm}"
                      th:action="${modoEdicao} ? @{|/propostas/${propostaForm.idProposta}|} : @{/propostas}"
                      method="post"
                      enctype="multipart/form-data"
                      data-submit-loading>

                    <div class="form-grid">
                        <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label" style="width: 100%;">
                            <input class="mdl-textfield__input" type="text" id="titulo" th:field="*{titulo}">
                            <label class="mdl-textfield__label" for="titulo">Título</label>
                            <span class="mdl-textfield__error" th:if="${#fields.hasErrors('titulo')}" th:errors="*{titulo}"></span>
                        </div>

                        <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label" style="width: 100%;">
                            <textarea class="mdl-textfield__input" id="descricao" rows="5" th:field="*{descricao}"></textarea>
                            <label class="mdl-textfield__label" for="descricao">Descrição</label>
                            <span class="mdl-textfield__error" th:if="${#fields.hasErrors('descricao')}" th:errors="*{descricao}"></span>
                        </div>

                        <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label" style="width: 100%;">
                            <input class="mdl-textfield__input" type="date" id="dataSubmissao" th:field="*{dataSubmissao}">
                            <label class="mdl-textfield__label" for="dataSubmissao">Data de submissão</label>
                            <span class="mdl-textfield__error" th:if="${#fields.hasErrors('dataSubmissao')}" th:errors="*{dataSubmissao}"></span>
                        </div>

                        <div class="mdl-textfield mdl-js-textfield mdl-textfield--floating-label" style="width: 100%;">
                            <select class="mdl-textfield__input" id="status" th:field="*{status}">
                                <option value="">Selecione...</option>
                                <option th:each="opt : ${statusOptions}" th:value="${opt}" th:text="${opt}"></option>
                            </select>
                            <label class="mdl-textfield__label" for="status">Status</label>
                            <span class="mdl-textfield__error" th:if="${#fields.hasErrors('status')}" th:errors="*{status}"></span>
                        </div>

                        <div>
                            <label class="mdl-typography--subtitle2" for="anexo">Anexo</label>
                            <div class="file-line" style="margin-top: 10px;">
                                <input type="file" id="anexo" th:field="*{anexo}" data-file-label>
                                <span class="file-name" data-file-name-for="anexo">Nenhum arquivo selecionado</span>
                            </div>
                            <p class="field-hint">No modo edição, se não enviar arquivo, o anexo atual será mantido.</p>
                            <span class="mdl-textfield__error" th:if="${#fields.hasErrors('anexo')}" th:errors="*{anexo}"></span>
                        </div>

                        <div class="form-actions">
                            <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--colored">
                                <i class="material-icons" style="margin-right: 8px;">save</i>
                                Salvar
                            </button>
                            <a th:href="@{/propostas}" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect">
                                Cancelar
                            </a>
                        </div>
                    </div>
                </form>
            </div>
        </section>
    </main>
</div>
</body>
</html>
