<!DOCTYPE html>
<html lang="pt-BR" xmlns:th="http://www.thymeleaf.org">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Propostas</title>
    <link rel="stylesheet" href="https://fonts.googleapis.com/icon?family=Material+Icons">
    <link rel="stylesheet" href="https://code.getmdl.io/1.3.0/material.indigo-pink.min.css">
    <script defer src="https://code.getmdl.io/1.3.0/material.min.js"></script>
    <style>
        body {
            min-height: 100vh;
            margin: 0;
            background: #f3f4f6;
        }

        .page-wrap {
            max-width: 1280px;
            margin: 0 auto;
            padding: 40px 16px;
        }

        .header-row {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            gap: 16px;
            margin-bottom: 20px;
        }

        .header-row h1 {
            margin: 0 0 6px;
            font-size: 2rem;
            color: #1f2937;
        }

        .table-card {
            width: 100%;
            overflow: hidden;
            border-radius: 16px;
        }

        .actions-cell {
            display: flex;
            gap: 8px;
            flex-wrap: wrap;
        }
    </style>
</head>
<body>
<div class="page-wrap">
    <div class="header-row">
        <div>
            <h1>CRUD de Propostas</h1>
            <a th:href="@{/}" class="mdl-button mdl-js-button mdl-button--icon" aria-label="Voltar para home">
                <i class="material-icons">home</i>
            </a>
        </div>
        <a th:href="@{/propostas/nova}" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--colored">
            <i class="material-icons" style="margin-right: 8px;">add</i>
            Nova proposta
        </a>
    </div>

    <div th:if="${mensagemSucesso}" class="mdl-color--green-50" style="padding: 12px 16px; border-radius: 8px; color: #15803d; margin-bottom: 16px;" th:text="${mensagemSucesso}"></div>
    <div th:if="${mensagemErro}" class="mdl-color--red-50" style="padding: 12px 16px; border-radius: 8px; color: #b91c1c; margin-bottom: 16px;" th:text="${mensagemErro}"></div>

    <div class="mdl-card mdl-shadow--6dp table-card">
        <div style="overflow-x: auto;">
            <table class="mdl-data-table mdl-js-data-table" style="width: 100%;">
                <thead>
                <tr>
                    <th class="mdl-data-table__cell--non-numeric">ID</th>
                    <th class="mdl-data-table__cell--non-numeric">Título</th>
                    <th class="mdl-data-table__cell--non-numeric">Data submissão</th>
                    <th class="mdl-data-table__cell--non-numeric">Status</th>
                    <th class="mdl-data-table__cell--non-numeric">Anexo</th>
                    <th class="mdl-data-table__cell--non-numeric">Ações</th>
                </tr>
                </thead>
                <tbody>
                <tr th:if="${#lists.isEmpty(propostas)}">
                    <td colspan="6" style="text-align: center; padding: 24px; color: rgba(0, 0, 0, 0.55);">Nenhuma proposta cadastrada.</td>
                </tr>
                <tr th:each="proposta : ${propostas}">
                    <td class="mdl-data-table__cell--non-numeric" th:text="${proposta.idProposta}">1</td>
                    <td class="mdl-data-table__cell--non-numeric" th:text="${proposta.titulo}">Título</td>
                    <td class="mdl-data-table__cell--non-numeric" th:text="${proposta.dataSubmissao}">2026-04-21</td>
                    <td class="mdl-data-table__cell--non-numeric">
                        <span class="mdl-chip" th:classappend="${proposta.status == 'aprovado'} ? ' mdl-color--green-100' : (${proposta.status == 'aguardando aprovação'} ? ' mdl-color--amber-100' : ' mdl-color--red-100')">
                            <span class="mdl-chip__text" th:text="${proposta.status}">status</span>
                        </span>
                    </td>
                    <td class="mdl-data-table__cell--non-numeric">
                        <a th:if="${proposta.anexos != null}" th:href="@{|/propostas/${proposta.idProposta}/anexo|}">Baixar</a>
                        <span th:if="${proposta.anexos == null}" style="color: rgba(0, 0, 0, 0.45);">Sem anexo</span>
                    </td>
                    <td class="mdl-data-table__cell--non-numeric">
                        <div class="actions-cell">
                            <a th:href="@{|/propostas/${proposta.idProposta}/editar|}" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect">
                                <i class="material-icons" style="margin-right: 8px;">edit</i>
                                Editar
                            </a>
                            <form th:action="@{|/propostas/${proposta.idProposta}/excluir|}" method="post" onsubmit="return confirm('Deseja realmente excluir?')" style="display: inline;">
                                <button type="submit" class="mdl-button mdl-js-button mdl-button--raised mdl-js-ripple-effect mdl-button--accent">
                                    <i class="material-icons" style="margin-right: 8px;">delete</i>
                                    Excluir
                                </button>
                            </form>
                        </div>
                    </td>
                </tr>
                </tbody>
            </table>
        </div>
    </div>
</div>
</body>
</html>
